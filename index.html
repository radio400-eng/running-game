  #progress-bar-container {

<script type="module">
import * as THREE from 'three';

// ── Scene Setup ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 8);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

// ── Ground / Track ──
const trackGeo = new THREE.PlaneGeometry(6, 200);
const trackMat = new THREE.MeshStandardMaterial({ color: 0xE07848, roughness: 0.9 });
const track = new THREE.Mesh(trackGeo, trackMat);
track.rotation.x = -Math.PI / 2;
track.position.z = -80;
track.receiveShadow = true;
scene.add(track);

// Track lines
for (let i = -1; i <= 1; i += 2) {
  const lineGeo = new THREE.PlaneGeometry(0.1, 200);
  const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set(i * 2.5, 0.01, -80);
  scene.add(line);
}

// Grass
for (let side = -1; side <= 1; side += 2) {
  const grassGeo = new THREE.PlaneGeometry(40, 200);
  const grassMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50, roughness: 1 });
  const grass = new THREE.Mesh(grassGeo, grassMat);
  grass.rotation.x = -Math.PI / 2;
  grass.position.set(side * 23, -0.01, -80);
  grass.receiveShadow = true;
  scene.add(grass);
}

// ── Character (bear image with background removed) ──
const character = new THREE.Group();

// Load bear image and remove background via canvas
const bearImg = new Image();
bearImg.crossOrigin = 'anonymous';
bearImg.src = '곰돌이 뒷모습.png';

let bearSprite;
const bearGeo = new THREE.PlaneGeometry(2.2, 2.8);
const bearMat = new THREE.MeshBasicMaterial({ transparent: true, side: THREE.DoubleSide, alphaTest: 0.3 });
bearSprite = new THREE.Mesh(bearGeo, bearMat);
bearSprite.position.y = 2.0;
character.add(bearSprite);

// Shadow blob under bear
const shadowGeo = new THREE.CircleGeometry(0.6, 16);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
const bearShadow = new THREE.Mesh(shadowGeo, shadowMat);
bearShadow.rotation.x = -Math.PI / 2;
bearShadow.position.y = 0.02;
character.add(bearShadow);

// Dust particles for running effect
const dustParticles = [];
function spawnDust() {
  const dustGeo = new THREE.SphereGeometry(0.08, 4, 4);
  const dustMat = new THREE.MeshBasicMaterial({ color: 0xD2B48C, transparent: true, opacity: 0.6 });
  const dust = new THREE.Mesh(dustGeo, dustMat);
  dust.position.set(
    character.position.x + (Math.random() - 0.5) * 0.5,
    0.1 + Math.random() * 0.3,
    character.position.z + 0.5 + Math.random() * 0.5
  );
  dust.userData = { life: 0.5, vel: new THREE.Vector3((Math.random()-0.5)*0.5, Math.random()*2, Math.random()*1) };
  scene.add(dust);
  dustParticles.push(dust);
}

bearImg.onload = () => {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  c.width = bearImg.width;
  c.height = bearImg.height;
  ctx.drawImage(bearImg, 0, 0);

  // Remove green/nature background - make transparent
  const imgData = ctx.getImageData(0, 0, c.width, c.height);
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // Remove greens (trees, grass, leaves)
    if (g > 80 && g > r * 0.9 && g > b * 1.1) {
      d[i+3] = 0;
    }
    // Remove bright sky/white areas at edges
    if (r > 180 && g > 180 && b > 160 && (r+g+b) > 520) {
      d[i+3] = 0;
    }
    // Remove yellowish greens
    if (g > 100 && r > 80 && b < 100 && g > b * 1.5) {
      d[i+3] = 0;
    }
  }

  // Edge smoothing pass
  const w = c.width, h = c.height;
  for (let y = 1; y < h-1; y++) {
    for (let x = 1; x < w-1; x++) {
      const idx = (y * w + x) * 4;
      if (d[idx+3] > 0) {
        let transparentNeighbors = 0;
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            if (dx === 0 && dy === 0) continue;
            const nIdx = ((y+dy) * w + (x+dx)) * 4;
            if (d[nIdx+3] === 0) transparentNeighbors++;
          }
        }
        if (transparentNeighbors >= 5) d[idx+3] = 0;
        else if (transparentNeighbors >= 3) d[idx+3] = Math.min(d[idx+3], 180);
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  bearMat.map = tex;
  bearMat.needsUpdate = true;
};

scene.add(character);

// Dummy refs
const legs = [bearSprite, bearSprite];
const arms = [bearSprite, bearSprite];
const body = bearSprite;
const head = bearSprite;

// ── Speed tracking for dynamic animation ──
let tapsPerSecond = 0;
let recentTaps = [];

// ── Pizza Shop (goal for 100+ taps) ──
function createPizzaShop(z) {
  const shop = new THREE.Group();

  // Building
  const wallGeo = new THREE.BoxGeometry(5, 4, 3);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xFFF8DC });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.y = 2;
  wall.castShadow = true;
  shop.add(wall);

  // Roof
  const roofGeo = new THREE.BoxGeometry(5.8, 0.4, 3.6);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0xCC3333 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 4.2;
  shop.add(roof);

  // Door
  const doorGeo = new THREE.BoxGeometry(1.2, 2.2, 0.1);
  const doorMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const door = new THREE.Mesh(doorGeo, doorMat);
  door.position.set(0, 1.1, 1.55);
  shop.add(door);

  // Sign "PIZZA"
  const signCanvas = document.createElement('canvas');
  signCanvas.width = 512; signCanvas.height = 128;
  const sCtx = signCanvas.getContext('2d');
  sCtx.fillStyle = '#CC3333';
  sCtx.fillRect(0, 0, 512, 128);
  sCtx.fillStyle = '#FFD700';
  sCtx.font = 'bold 72px sans-serif';
  sCtx.textAlign = 'center';
  sCtx.fillText('🍕 PIZZA 🍕', 256, 88);
  const signTex = new THREE.CanvasTexture(signCanvas);
  const signGeo = new THREE.PlaneGeometry(4, 1);
  const signMat = new THREE.MeshBasicMaterial({ map: signTex });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(0, 5, 1.55);
  shop.add(sign);

  // Window lights
  for (let side = -1; side <= 1; side += 2) {
    const winGeo = new THREE.PlaneGeometry(0.8, 0.8);
    const winMat = new THREE.MeshStandardMaterial({ color: 0xFFFF99, emissive: 0xFFFF44, emissiveIntensity: 0.5 });
    const win = new THREE.Mesh(winGeo, winMat);
    win.position.set(side * 1.6, 2.8, 1.56);
    shop.add(win);
  }

  shop.position.set(0, 0, z);
  shop.visible = false;
  scene.add(shop);
  return shop;
}

const pizzaShop = createPizzaShop(-130);

// ── Decorations (trees alongside track) ──
function createTree(x, z) {
  const group = new THREE.Group();
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.5, 6);
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8D6E63 });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.y = 0.75;
  trunk.castShadow = true;
  group.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(0.8, 6, 6);
  const leavesMat = new THREE.MeshStandardMaterial({ color: 0x388E3C });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.y = 2;
  leaves.castShadow = true;
  group.add(leaves);

  group.position.set(x, 0, z);
  scene.add(group);
  return group;
}

const trees = [];
for (let i = 0; i < 30; i++) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (4 + Math.random() * 3);
  const z = -i * 6 + Math.random() * 3;
  trees.push(createTree(x, z));
}

// ── Pizza markers (replacing distance markers) ──
function createPizza(z, scale) {
  const group = new THREE.Group();

  // Pizza base (cylinder)
  const baseGeo = new THREE.CylinderGeometry(0.8 * scale, 0.8 * scale, 0.1 * scale, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0xF4A460 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.castShadow = true;
  group.add(base);

  // Cheese top
  const cheeseGeo = new THREE.CylinderGeometry(0.7 * scale, 0.7 * scale, 0.06 * scale, 16);
  const cheeseMat = new THREE.MeshStandardMaterial({ color: 0xFFD700 });
  const cheese = new THREE.Mesh(cheeseGeo, cheeseMat);
  cheese.position.y = 0.06 * scale;
  group.add(cheese);

  // Pepperoni toppings
  const pepColors = [0xCC3333, 0xBB2222, 0xDD4444];
  for (let i = 0; i < 6; i++) {
    const pepGeo = new THREE.CylinderGeometry(0.1 * scale, 0.1 * scale, 0.04 * scale, 8);
    const pepMat = new THREE.MeshStandardMaterial({ color: pepColors[i % 3] });
    const pep = new THREE.Mesh(pepGeo, pepMat);
    const angle = (i / 6) * Math.PI * 2;
    const r = 0.35 * scale;
    pep.position.set(Math.cos(angle) * r, 0.1 * scale, Math.sin(angle) * r);
    group.add(pep);
  }

  // Green pepper bits
  for (let i = 0; i < 4; i++) {
    const greenGeo = new THREE.BoxGeometry(0.08 * scale, 0.03 * scale, 0.08 * scale);
    const greenMat = new THREE.MeshStandardMaterial({ color: 0x2E8B57 });
    const green = new THREE.Mesh(greenGeo, greenMat);
    const angle = (i / 4) * Math.PI * 2 + 0.4;
    const r = 0.2 * scale;
    green.position.set(Math.cos(angle) * r, 0.1 * scale, Math.sin(angle) * r);
    green.rotation.y = Math.random() * Math.PI;
    group.add(green);
  }

  group.position.set(0, 2.5, z);
  group.rotation.x = -0.3;
  scene.add(group);
  return group;
}

const markers = [];
// Small pizzas along the way, getting BIGGER near the goal
for (let i = 1; i <= 8; i++) {
  markers.push(createPizza(-i * 12, 0.6 + i * 0.1));
}

// Giant goal pizza at the end!
const goalPizza = createPizza(-110, 2.5);
goalPizza.position.y = 3;

// ── Game State ──
let gameState = 'idle'; // idle, countdown, playing, ended
let tapCount = 0;
let timeLeft = 10;
let startTime = 0;
let runSpeed = 0;
let runDistance = 0;
let animTime = 0;
let playerName = '';

const timerEl = document.getElementById('timer');
const tapCountEl = document.getElementById('tap-count');

// ── Leaderboard (Firestore) ──
const db = window.db;

async function saveScore(name, score) {
  try {
    await db.collection('leaderboard').add({
      name,
      score,
      date: firebase.firestore.FieldValue.serverTimestamp()
    });
  } catch (e) { console.error('저장 실패:', e); }
}

async function renderLeaderboard() {
  const medals = ['🥇', '🥈', '🥉'];
  try {
    const snapshot = await db.collection('leaderboard')
      .orderBy('score', 'desc')
      .limit(3)
      .get();
    if (snapshot.empty) {
      lbList.innerHTML = '<div class="lb-empty">기록 없음</div>';
      return;
    }
    lbList.innerHTML = '';
    snapshot.forEach((doc, i) => {
      const data = doc.data();
      const idx = lbList.children.length;
      lbList.innerHTML += `<div class="lb-entry">
        <span class="lb-rank">${medals[idx] || ''}</span>
        <span class="lb-name">${data.name}</span>
        <span class="lb-score">${data.score}회</span>
      </div>`;
    });
  } catch (e) {
    console.error('랭킹 로드 실패:', e);
    lbList.innerHTML = '<div class="lb-empty">로딩 중...</div>';
  }
}

renderLeaderboard();

  playerName = nameInput.value.trim() || '이름없음';

});

document.getElementById('start-btn2').addEventListener('click', () => {
  startScreen.style.display = 'none';
  startCountdown();
});

document.getElementById('retry-btn').addEventListener('click', () => {
  resultScreen.style.display = 'none';
  startCountdown();
});

function startCountdown() {
  startScreen.style.display = 'none';
  resultScreen.style.display = 'none';
  gameState = 'countdown';
  tapCount = 0;
  timeLeft = 10;
  runSpeed = 0;
  runDistance = 0;
  tapsPerSecond = 0;
  recentTaps = [];
  tapCountEl.textContent = '0';
  character.scale.setScalar(1);
  character.position.set(0, 0, 0);
  camera.fov = 60;
  camera.updateProjectionMatrix();
  pizzaShop.visible = false;
  goalPizza.visible = true;

  countdownOverlay.style.display = 'flex';
  let count = 3;
  countdownText.textContent = count;
  countdownText.style.animation = 'none';
  void countdownText.offsetWidth;
  countdownText.style.animation = 'pulse 0.5s ease-in-out';

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      countdownText.textContent = count;
      countdownText.style.animation = 'none';
      void countdownText.offsetWidth;
      countdownText.style.animation = 'pulse 0.5s ease-in-out';
    } else if (count === 0) {
      countdownText.textContent = 'GO!';
      countdownText.style.color = '#FFD700';
      countdownText.style.animation = 'none';
      void countdownText.offsetWidth;
      countdownText.style.animation = 'pulse 0.5s ease-in-out';
    } else {
      clearInterval(interval);
      countdownOverlay.style.display = 'none';
      countdownText.style.color = '#fff';
      startGame();
    }
  }, 800);
}

function startGame() {
  gameState = 'playing';
  startTime = performance.now();
  hud.style.display = 'block';
}

function endGame() {
  gameState = 'ended';
  hud.style.display = 'none';

  resultTaps.textContent = tapCount;

  let grade = '';
  if (tapCount >= 150) { grade = '🍕🐻 피자가게 입성! 맛있게 먹자!'; resultGrade.style.color = '#FFD700'; }
  else if (tapCount >= 100) { grade = '🏁 골인! 피자가 눈앞에!'; resultGrade.style.color = '#FF6B35'; }
  else if (tapCount >= 70) { grade = '🔥 피자 냄새가 진하게 나!'; resultGrade.style.color = '#F7C948'; }
  else if (tapCount >= 40) { grade = '🐻 조금만 더 힘내!'; resultGrade.style.color = '#4CAF50'; }
  else if (tapCount >= 20) { grade = '🍕 아직 멀었어.. 더 빨리!'; resultGrade.style.color = '#2196F3'; }
  else { grade = '😢 피자가 식어버렸어...'; resultGrade.style.color = '#9E9E9E'; }

  resultGrade.textContent = grade;

  // 150번 이상: 피자가게 들어가기 연출
  if (tapCount >= 150) {
    pizzaShop.visible = true;
    gameState = 'entering_shop';
    setTimeout(() => {
      resultScreen.style.display = 'flex';
      saveScore(playerName, tapCount).then(() => renderLeaderboard());
    }, 2500);
  } else if (tapCount >= 100) {
    // 100번 이상: 골인 지점 보이기
    goalPizza.visible = true;
    gameState = 'goal_reached';
    setTimeout(() => {
      resultScreen.style.display = 'flex';
      saveScore(playerName, tapCount).then(() => renderLeaderboard());
    }, 1500);
  } else {
    resultScreen.style.display = 'flex';
    saveScore(playerName, tapCount).then(() => renderLeaderboard());
  }
}

// ── Tap Handler ──
function handleTap(e) {
  if (gameState !== 'playing') return;

  tapCount++;
  tapCountEl.textContent = tapCount;
  tapCountEl.classList.remove('tap-bounce');
  void tapCountEl.offsetWidth;
  tapCountEl.classList.add('tap-bounce');

  // Track taps per second for speed feel
  const now = performance.now();
  recentTaps.push(now);
  recentTaps = recentTaps.filter(t => now - t < 1000);
  tapsPerSecond = recentTaps.length;

  // Speed boost - more taps = faster!
  const speedBoost = Math.min(0.15 + tapsPerSecond * 0.05, 1.2);
  runSpeed = Math.min(runSpeed + speedBoost, 15);

  // Show pizza shop when reaching 100+ taps
  if (tapCount >= 100) {
    pizzaShop.visible = true;
  }

  // Ripple effect
  const x = e.clientX || (e.touches && e.touches[0]?.clientX) || window.innerWidth / 2;
  const y = e.clientY || (e.touches && e.touches[0]?.clientY) || window.innerHeight / 2;
  const ripple = document.createElement('div');
  ripple.className = 'tap-effect';
  ripple.style.left = (x - 30) + 'px';
  ripple.style.top = (y - 30) + 'px';
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 400);
}

// Prevent double events on mobile
window.addEventListener('touchstart', (e) => {
  // 버튼/입력 터치는 기본 동작 허용
  if (e.target.closest('.btn') || e.target.closest('#name-input')) return;
  e.preventDefault();
  handleTap(e);
}, { passive: false });

window.addEventListener('mousedown', (e) => {
  handleTap(e);
});

// ── Clouds ──
const clouds = [];
for (let i = 0; i < 8; i++) {
  const cloudGeo = new THREE.SphereGeometry(1 + Math.random(), 6, 6);
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
  const cloud = new THREE.Mesh(cloudGeo, cloudMat);
  cloud.position.set(
    (Math.random() - 0.5) * 30,
    10 + Math.random() * 5,
    -Math.random() * 60
  );
  cloud.scale.set(2, 0.6, 1);
  scene.add(cloud);
  clouds.push(cloud);
}

// ── Animation Loop ──
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  animTime += delta;

  if (gameState === 'playing') {
    // Timer
    const elapsed = (performance.now() - startTime) / 1000;
    timeLeft = Math.max(0, 10 - elapsed);
    timerEl.textContent = timeLeft.toFixed(2);
    progressBar.style.width = (timeLeft / 10 * 100) + '%';

    // Timer color
    if (timeLeft <= 3) {
      timerEl.style.color = '#FF4444';
    } else {
      timerEl.style.color = '#fff';
    }

    if (timeLeft <= 0) {
      endGame();
    }

    // Speed decay - faster decay when not tapping
    const now = performance.now();
    recentTaps = recentTaps.filter(t => now - t < 1000);
    tapsPerSecond = recentTaps.length;
    runSpeed *= tapsPerSecond > 5 ? 0.985 : 0.96;
    runDistance += runSpeed * delta;

    // Dynamic bear animation based on speed
    const speedRatio = Math.min(runSpeed / 10, 1);
    const bounceFreq = 10 + speedRatio * 18;
    const bounceAmp = 0.05 + speedRatio * 0.3;

    // Running cycle phase
    const runCycle = Math.sin(animTime * bounceFreq);
    const runCycleAbs = Math.abs(runCycle);

    // Bear bouncing - sharp up, smooth down (like real running)
    bearSprite.position.y = 2.0 + runCycleAbs * bounceAmp;

    // Forward/backward lean based on speed
    bearSprite.rotation.x = speedRatio * 0.12;

    // Left-right sway (alternating with each step)
    bearSprite.rotation.z = runCycle * 0.06 * speedRatio;

    // Slight left-right position shift (hip movement)
    bearSprite.position.x = Math.sin(animTime * bounceFreq * 0.5) * 0.04 * speedRatio;

    // Scale: slightly squash on landing, stretch on jump
    const squash = 1 - runCycleAbs * 0.04 * speedRatio;
    const stretch = 1 + runCycleAbs * 0.04 * speedRatio;
    bearSprite.scale.set(stretch, squash, 1);

    // Shadow scales with height
    bearShadow.scale.setScalar(1 - runCycleAbs * bounceAmp * 0.3);
    bearShadow.material.opacity = 0.3 - runCycleAbs * bounceAmp * 0.1;

    // Spawn dust when running fast
    if (speedRatio > 0.3 && Math.random() < speedRatio * 0.3) {
      spawnDust();
    }

    // Update dust particles
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const dust = dustParticles[i];
      dust.userData.life -= delta;
      dust.position.add(dust.userData.vel.clone().multiplyScalar(delta));
      dust.userData.vel.y -= delta * 3;
      dust.material.opacity = Math.max(0, dust.userData.life * 1.2);
      dust.scale.setScalar(1 + (0.5 - dust.userData.life));
      if (dust.userData.life <= 0) {
        scene.remove(dust);
        dustParticles.splice(i, 1);
      }
    }

    // Speed lines effect (camera FOV)
    camera.fov = 60 + speedRatio * 15;
    camera.updateProjectionMatrix();

    // Camera follows with dynamic distance
    character.position.z = -runDistance * 0.5;
    const camDist = 8 - speedRatio * 2;
    camera.position.z = character.position.z + camDist;
    camera.position.y = 4 - speedRatio * 0.5;
    camera.lookAt(character.position.x, 1.5, character.position.z);

    // Move trees that went behind camera back to front
    trees.forEach(tree => {
      if (tree.position.z > camera.position.z + 5) {
        tree.position.z -= 180;
      }
    });

    // Move clouds
    clouds.forEach(cloud => {
      if (cloud.position.z > camera.position.z + 10) {
        cloud.position.z -= 80;
      }
    });

  } else if (gameState === 'idle' || gameState === 'countdown') {
    // Idle animation - gentle bobbing
    character.position.y = Math.sin(animTime * 2) * 0.03;
    bearSprite.position.y = 2.0 + Math.sin(animTime * 2) * 0.05;
    bearSprite.rotation.z = 0;
    bearSprite.rotation.x = 0;
    bearSprite.scale.set(1, 1, 1);

  } else if (gameState === 'ended' || gameState === 'goal_reached') {
    // Slow down with gentle bounce
    runSpeed *= 0.95;
    runDistance += runSpeed * delta;
    character.position.z = -runDistance * 0.5;
    camera.position.z = character.position.z + 8;
    camera.lookAt(character.position.x, 1.5, character.position.z);
    bearSprite.position.y = 2.0 + Math.abs(Math.sin(animTime * 6)) * 0.05;
    bearSprite.rotation.x = 0;
    bearSprite.rotation.z = 0;
    bearSprite.scale.set(1, 1, 1);

    // Clean dust
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const dust = dustParticles[i];
      dust.userData.life -= delta;
      dust.material.opacity = Math.max(0, dust.userData.life);
      if (dust.userData.life <= 0) { scene.remove(dust); dustParticles.splice(i, 1); }
    }

  } else if (gameState === 'entering_shop') {
    // Walk toward pizza shop
    runSpeed = Math.max(runSpeed * 0.97, 2);
    runDistance += runSpeed * delta;
    character.position.z = -runDistance * 0.5;

    // Bear keeps jogging
    bearSprite.position.y = 2.0 + Math.abs(Math.sin(animTime * 12)) * 0.15;
    bearSprite.rotation.z = Math.sin(animTime * 6) * 0.04;

    // Move toward shop door - shrink as entering
    const shopZ = pizzaShop.position.z;
    const distToShop = Math.abs(character.position.z - shopZ);
    if (distToShop < 15) {
      const enterProgress = 1 - (distToShop / 15);
      character.scale.setScalar(Math.max(1 - enterProgress * 0.8, 0.2));
      camera.position.z = character.position.z + 8 + enterProgress * 3;
      camera.position.y = 4 + enterProgress * 2;
    } else {
      camera.position.z = character.position.z + 8;
    }
    camera.lookAt(character.position.x, 2, character.position.z - 5);

    // Clean dust
    for (let i = dustParticles.length - 1; i >= 0; i--) {
      const dust = dustParticles[i];
      dust.userData.life -= delta;
      dust.material.opacity = Math.max(0, dust.userData.life);
      if (dust.userData.life <= 0) { scene.remove(dust); dustParticles.splice(i, 1); }
    }
  }

  // Rotate pizza markers
  markers.forEach(m => { m.rotation.y += delta * 1.5; });
  goalPizza.rotation.y += delta * 2;

  // Direction light follows
  dirLight.position.x = character.position.x + 5;
  dirLight.position.z = character.position.z + 5;
  dirLight.target.position.copy(character.position);
  dirLight.target.updateMatrixWorld();

  renderer.render(scene, camera);
}

animate();

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
